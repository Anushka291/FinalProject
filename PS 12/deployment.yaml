apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-app
  template:
    metadata:
      labels:
        app: content-app
    spec:
      containers:
        - name: content-app
          image: docker.io/anushkag1234/content-management-crud:1.0
          ports:
            - containerPort: 3000